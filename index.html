<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDV - Asadero Lupita</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-gray-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const Iconos = {
      Utensils: () => <span>🍽️</span>, Lock: () => <span>🔒</span>, Unlock: () => <span>🔓</span>,
      Store: () => <span>🏪</span>, Truck: () => <span>🚚</span>, MinusCircle: () => <span>➖</span>,
      Calculator: () => <span>🧮</span>, CalendarDays: () => <span>📅</span>, Banknote: () => <span>💵</span>,
      CreditCard: () => <span>💳</span>, PlusCircle: () => <span>➕</span>, ListOrdered: () => <span>📋</span>,
      Trash2: () => <span>🗑️</span>, Download: () => <span>📥</span>, TrendingUp: () => <span>📈</span>,
      Star: () => <span>⭐</span>, Users: () => <span>👥</span>
    };

    const firebaseConfig = {
      apiKey: "AIzaSyCa3OBuZv2jclX0G-dJVJa805iHnZXrhdA",
      authDomain: "asadero-lupita-d9e55.firebaseapp.com",
      projectId: "asadero-lupita-d9e55",
      storageBucket: "asadero-lupita-d9e55.firebasestorage.app",
      messagingSenderId: "171581280772",
      appId: "1:171581280772:web:05f791a676a5a72e715b51"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const PRECIOS = { 
      entero: 190, mitad: 95, paquete: 220, 
      tortillaMedio: 13, tortillaKilo: 26, refresco: 30 
    };
    const EQUIVALENCIA_POLLOS = { entero: 1, mitad: 0.5, paquete: 1 };
    const PIN_PATRON = "527";

    const ProductoInput = ({ nombre, desc, name, value, onChange }) => (
      <div className="flex justify-between items-center bg-white border-2 border-red-100 p-2 rounded shadow-sm">
        <div>
          <span className="block font-bold text-gray-800 text-sm">{nombre}</span>
          <span className="block text-xs text-red-600 font-bold">{desc}</span>
        </div>
        <div className="flex items-center gap-2">
          <button type="button" onClick={() => onChange({ target: { name, value: Math.max(0, value - 1) } })} className="bg-red-600 text-white w-8 h-8 rounded font-black">-</button>
          <input type="number" name={name} value={value === 0 ? '' : value} onChange={onChange} min="0" className="w-12 text-center border rounded font-bold bg-gray-50 outline-none" placeholder="0" />
          <button type="button" onClick={() => onChange({ target: { name, value: value + 1 } })} className="bg-yellow-500 text-gray-900 w-8 h-8 rounded font-black">+</button>
        </div>
      </div>
    );

    function App() {
      const [vista, setVista] = useState('local');
      const [esPatron, setEsPatron] = useState(false);

      const [modalAlerta, setModalAlerta] = useState({ visible: false, mensaje: '' });
      const [modalConfirmacion, setModalConfirmacion] = useState({ visible: false, mensaje: '', action: null });
      const [modalPin, setModalPin] = useState(false);
      const [inputPin, setInputPin] = useState('');

      const [orden, setOrden] = useState({ 
        entero: 0, mitad: 0, paquete: 0,
        tortillaMedio: 0, tortillaKilo: 0, refresco: 0, 
        domicilio: '', notasEnvio: '', metodoPago: 'efectivo',
        telefono: '', nombreCliente: ''
      });
      
      const [nuevoGasto, setNuevoGasto] = useState({ descripcion: '', monto: '' });
      const [ingresoPollo, setIngresoPollo] = useState('');
      const [ingresoRefresco, setIngresoRefresco] = useState('');
      const [mermaPollo, setMermaPollo] = useState('');
      const [mermaRefresco, setMermaRefresco] = useState('');
      
      const [nuevoClienteManual, setNuevoClienteManual] = useState({ telefono: '', nombre: '' });
      const [clientesAgenda, setClientesAgenda] = useState([]);

      const [tortillaProv, setTortillaProv] = useState({ dejo: 0, regreso: 0 });
      const [entradasHoy, setEntradasHoy] = useState({ pollos: 0, refrescos: 0 });
      
      const hoyStr = new Date().toLocaleDateString('es-MX');

      const [ventas, setVentas] = useState([]);
      const [gastos, setGastos] = useState([]);
      const [historialTortillas, setHistorialTortillas] = useState({});
      
      const [stockPollos, setStockPollos] = useState(0);
      const [stockRefrescos, setStockRefrescos] = useState(0);

      useEffect(() => {
        const unsubVentas = db.collection('ventas').onSnapshot((snap) => {
          const v = snap.docs.map(d => ({ dbId: d.id, ...d.data() }));
          setVentas(v.sort((a, b) => b.id - a.id));
        });

        const unsubGastos = db.collection('gastos').onSnapshot((snap) => {
          const g = snap.docs.map(d => ({ dbId: d.id, ...d.data() }));
          setGastos(g.sort((a, b) => b.id - a.id));
        });

        const unsubClientes = db.collection('clientes').onSnapshot((snap) => {
          const c = snap.docs.map(d => d.data());
          setClientesAgenda(c);
        });

        const unsubStock = db.collection('config').doc('stock').onSnapshot((docSnap) => {
          if (docSnap.exists) {
            setStockPollos(docSnap.data().pollos || 0);
            setStockRefrescos(docSnap.data().refrescos || 0);
          }
        });

        const unsubTortilla = db.collection('inventario_tortilla').doc(hoyStr.replace(/\//g, '-')).onSnapshot((doc) => {
          if (doc.exists) setTortillaProv(doc.data());
        });

        const unsubHistorialTortillas = db.collection('inventario_tortilla').onSnapshot((snap) => {
          const hist = {};
          snap.forEach(doc => { hist[doc.id] = doc.data(); });
          setHistorialTortillas(hist);
        });

        const unsubEntradas = db.collection('entradas_diarias').doc(hoyStr.replace(/\//g, '-')).onSnapshot((doc) => {
          if (doc.exists) setEntradasHoy(doc.data());
        });

        return () => { unsubVentas(); unsubGastos(); unsubClientes(); unsubStock(); unsubTortilla(); unsubHistorialTortillas(); unsubEntradas(); };
      }, []);

      const ventasHoy = ventas.filter(v => v.fechaDia === hoyStr);
      const gastosHoy = gastos.filter(g => g.fechaDia === hoyStr);

      const verificarPin = () => {
        if (inputPin === PIN_PATRON) {
          setEsPatron(true); setModalPin(false); setInputPin('');
        } else {
          setModalAlerta({ visible: true, mensaje: "PIN Incorrecto." }); setInputPin('');
        }
      };

      const cerrarSesionPatron = () => { setEsPatron(false); setVista('local'); };

      const handleOrdenChange = (e) => {
        const { name, value } = e.target;
        if (name === 'notasEnvio' || name === 'metodoPago' || name === 'nombreCliente') {
          setOrden(prev => ({ ...prev, [name]: value }));
        } else if (name === 'telefono') {
          const numClean = value.replace(/\D/g, '').slice(0, 10);
          setOrden(prev => {
            const updated = { ...prev, telefono: numClean };
            if (numClean.length === 10) {
              const clienteAgenda = clientesAgenda.find(c => c.telefono === numClean);
              if (clienteAgenda) {
                updated.nombreCliente = clienteAgenda.nombre;
              } else {
                const historialCliente = ventas.find(v => v.telefono === numClean);
                if (historialCliente) {
                  updated.nombreCliente = historialCliente.nombreCliente || '';
                  updated.notasEnvio = historialCliente.notasEnvio || '';
                }
              }
            }
            return updated;
          });
        } else {
          setOrden(prev => ({ ...prev, [name]: value === '' ? 0 : Math.max(0, parseInt(value) || 0) }));
        }
      };

      const agregarClienteManual = async (e) => {
        e.preventDefault();
        const tel = nuevoClienteManual.telefono.replace(/\D/g, '');
        if (tel.length !== 10 || !nuevoClienteManual.nombre) {
          return setModalAlerta({ visible: true, mensaje: "Ingresa 10 dígitos y el nombre." });
        }
        try {
          await db.collection('clientes').doc(tel).set({
            telefono: tel,
            nombre: nuevoClienteManual.nombre,
            agregadoManual: true
          }, { merge: true });
          setNuevoClienteManual({ telefono: '', nombre: '' });
          setModalAlerta({ visible: true, mensaje: "¡Cliente guardado con éxito!" });
        } catch (error) {
          setModalAlerta({ visible: true, mensaje: "Error de red. Intenta en 1 minuto." });
        }
      };

      const clientesVIP = useMemo(() => {
        const mapa = {};
        clientesAgenda.forEach(c => {
          mapa[c.telefono] = { telefono: c.telefono, nombre: c.nombre, totalPollos: 0, totalPedidos: 0, fechas: new Set() };
        });

        ventas.forEach(v => {
          if (v.telefono && typeof v.telefono === 'string' && v.telefono.length === 10) {
            if (!mapa[v.telefono]) {
              mapa[v.telefono] = { telefono: v.telefono, nombre: v.nombreCliente || 'Cliente Sin Nombre', totalPollos: 0, totalPedidos: 0, fechas: new Set() };
            }
            mapa[v.telefono].totalPollos += v.pollosTotales || 0;
            mapa[v.telefono].totalPedidos += 1;
            mapa[v.telefono].fechas.add(v.fechaDia);
            if (v.nombreCliente && v.nombreCliente !== 'Cliente Sin Nombre') {
              mapa[v.telefono].nombre = v.nombreCliente; 
            }
          }
        });

        return Object.values(mapa).sort((a, b) => b.totalPollos - a.totalPollos);
      }, [ventas, clientesAgenda]);

      const agregarStockPollo = async (e) => {
        e.preventDefault();
        const cantidad = parseFloat(ingresoPollo);
        if (isNaN(cantidad) || cantidad <= 0) return setModalAlerta({ visible: true, mensaje: "Ingresa cantidad válida." });
        await db.collection('config').doc('stock').set({ pollos: stockPollos + cantidad }, { merge: true });
        await db.collection('entradas_diarias').doc(hoyStr.replace(/\//g, '-')).set({ pollos: (entradasHoy.pollos || 0) + cantidad }, { merge: true });
        setIngresoPollo('');
      };

      const restarMermaPollo = async (e) => {
        e.preventDefault();
        const cantidad = parseFloat(mermaPollo);
        if (isNaN(cantidad) || cantidad <= 0) return setModalAlerta({ visible: true, mensaje: "Ingresa cantidad válida." });
        await db.collection('config').doc('stock').set({ pollos: stockPollos - cantidad }, { merge: true });
        setMermaPollo('');
      };

      const agregarStockRefresco = async (e) => {
        e.preventDefault();
        const cantidad = parseInt(ingresoRefresco);
        if (isNaN(cantidad) || cantidad <= 0) return setModalAlerta({ visible: true, mensaje: "Ingresa cantidad válida." });
        await db.collection('config').doc('stock').set({ refrescos: stockRefrescos + cantidad }, { merge: true });
        await db.collection('entradas_diarias').doc(hoyStr.replace(/\//g, '-')).set({ refrescos: (entradasHoy.refrescos || 0) + cantidad }, { merge: true });
        setIngresoRefresco('');
      };

      const restarMermaRefresco = async (e) => {
        e.preventDefault();
        const cantidad = parseInt(mermaRefresco);
        if (isNaN(cantidad) || cantidad <= 0) return setModalAlerta({ visible: true, mensaje: "Ingresa cantidad válida." });
        await db.collection('config').doc('stock').set({ refrescos: stockRefrescos - cantidad }, { merge: true });
        setMermaRefresco('');
      };

      const actualizarTortillaProv = async (campo, valor) => {
        const nuevaData = { ...tortillaProv, [campo]: parseFloat(valor) || 0 };
        setTortillaProv(nuevaData);
        await db.collection('inventario_tortilla').doc(hoyStr.replace(/\//g, '-')).set(nuevaData);
      };

      const subtotalPollo = (orden.entero || 0) * PRECIOS.entero + (orden.mitad || 0) * PRECIOS.mitad + (orden.paquete || 0) * PRECIOS.paquete;
      const subtotalComplementos = (orden.tortillaMedio || 0) * PRECIOS.tortillaMedio + (orden.tortillaKilo || 0) * PRECIOS.tortillaKilo + (orden.refresco || 0) * PRECIOS.refresco;
      const costoEnvio = parseFloat(orden.domicilio) || 0;
      const totalOrden = subtotalPollo + subtotalComplementos + costoEnvio;
      
      const pollosOrden = (orden.entero || 0) * EQUIVALENCIA_POLLOS.entero + (orden.mitad || 0) * EQUIVALENCIA_POLLOS.mitad + (orden.paquete || 0) * EQUIVALENCIA_POLLOS.paquete;
      const refrescosOrden = (orden.refresco || 0) + (orden.paquete || 0);

      const registrarVenta = async (e, tipo) => {
        e.preventDefault();
        if (totalOrden === 0 && costoEnvio === 0) return setModalAlerta({ visible: true, mensaje: "La orden está en ceros." });
        if (tipo === 'domicilio' && !orden.telefono) return setModalAlerta({ visible: true, mensaje: "Ingresa el teléfono del cliente." });

        const nuevaVenta = {
          id: Date.now(), tipo, fechaDia: hoyStr,
          hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
          detalles: { ...orden }, subtotalPollo, subtotalComplementos, costoEnvio,
          total: totalOrden, pollosTotales: pollosOrden, refrescosTotales: refrescosOrden, metodoPago: orden.metodoPago,
          telefono: orden.telefono || '', nombreCliente: orden.nombreCliente || '', notasEnvio: orden.notasEnvio || ''
        };

        try {
          if (orden.telefono && orden.telefono.length === 10 && orden.nombreCliente) {
             await db.collection('clientes').doc(orden.telefono).set({
                telefono: orden.telefono, nombre: orden.nombreCliente
             }, { merge: true });
          }
          await db.collection('ventas').add(nuevaVenta);
          await db.collection('config').doc('stock').set({ pollos: stockPollos - pollosOrden, refrescos: stockRefrescos - refrescosOrden }, { merge: true });
          
          setOrden({ entero: 0, mitad: 0, paquete: 0, tortillaMedio: 0, tortillaKilo: 0, refresco: 0, domicilio: '', notasEnvio: '', metodoPago: 'efectivo', telefono: '', nombreCliente: '' });
        } catch (error) {
           setModalAlerta({ visible: true, mensaje: "Error al guardar. Verifica tu conexión." });
        }
      };

      const registrarGasto = async (e) => {
        e.preventDefault();
        const monto = parseFloat(nuevoGasto.monto);
        if (!nuevoGasto.descripcion || isNaN(monto) || monto <= 0) return setModalAlerta({ visible: true, mensaje: "Gasto inválido." });
        await db.collection('gastos').add({ id: Date.now(), fechaDia: hoyStr, descripcion: nuevoGasto.descripcion, monto: monto });
        setNuevoGasto({ descripcion: '', monto: '' });
      };

      const eliminarRegistro = (dbId, idOriginal, tipo) => {
        if(!esPatron) return setModalAlerta({ visible: true, mensaje: "Solo el patrón puede eliminar registros." });
        setModalConfirmacion({
          visible: true, mensaje: `¿Eliminar permanentemente de tu base de datos?`,
          action: async () => {
            if (tipo === 'venta') {
              const v = ventas.find(v => v.id === idOriginal);
              if (v) {
                await db.collection('ventas').doc(dbId).delete();
                await db.collection('config').doc('stock').set({ pollos: stockPollos + (v.pollosTotales || 0), refrescos: stockRefrescos + (v.refrescosTotales || 0) }, { merge: true });
              }
            }
            if (tipo === 'gasto') await db.collection('gastos').doc(dbId).delete();
          }
        });
      };

      const calcularResumen = (listaVentas, listaGastos) => {
        return listaVentas.reduce((acc, v) => {
          let det = v.detalles || {};
          acc.ventasTotales += v.total || 0;
          acc.ingresoEfectivo += v.metodoPago === 'efectivo' ? (v.total || 0) : 0;
          acc.ingresoTransferencia += v.metodoPago === 'transferencia' ? (v.total || 0) : 0;
          acc.pollos += v.pollosTotales || 0;
          acc.refrescosVendidos += (det.refresco || 0) + (det.paquete || 0);
          
          // Lógica del dinero apartado para los refrescos
          acc.apartadoRefrescos += (det.refresco || 0) * 30 + (det.paquete || 0) * 10;
          
          if (v.tipo === 'domicilio') {
              acc.cantidadEnvios += 1;
              if (v.metodoPago === 'efectivo') acc.costoEnvioEfectivo += (v.costoEnvio || 0);
              else acc.costoEnvioTransferencia += (v.costoEnvio || 0);
          }
          return acc;
        }, { 
          ventasTotales: 0, ingresoEfectivo: 0, ingresoTransferencia: 0, pollos: 0, 
          refrescosVendidos: 0, apartadoRefrescos: 0, cantidadEnvios: 0, costoEnvioEfectivo: 0, costoEnvioTransferencia: 0,
          totalGastos: listaGastos.reduce((sum, g) => sum + (g.monto || 0), 0)
        });
      };

      const resHoy = calcularResumen(ventasHoy, gastosHoy);
      
      const pollosInicialHoy = stockPollos + resHoy.pollos - (entradasHoy.pollos || 0);
      const refrescosInicialHoy = stockRefrescos + resHoy.refrescosVendidos - (entradasHoy.refrescos || 0);

      const historialDias = useMemo(() => {
        const grupos = {};
        ventas.forEach(v => {
          if (!grupos[v.fechaDia]) grupos[v.fechaDia] = { fecha: v.fechaDia, ventas: [], gastos: [] };
          grupos[v.fechaDia].ventas.push(v);
        });
        gastos.forEach(g => {
          if (!grupos[g.fechaDia]) grupos[g.fechaDia] = { fecha: g.fechaDia, ventas: [], gastos: [] };
          grupos[g.fechaDia].gastos.push(g);
        });
        return Object.values(grupos).sort((a, b) => new Date(b.fecha.split('/').reverse().join('-')) - new Date(a.fecha.split('/').reverse().join('-')));
      }, [ventas, gastos]);

      const exportarExcel = () => {
        let tablaHTML = `
          <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
          <head>
            <meta charset="UTF-8">
            <style>
              table { font-family: Arial, sans-serif; border-collapse: collapse; text-align: center; width: 100%; }
              th { border: 1px solid #dddddd; padding: 8px; }
              td { border: 1px solid #dddddd; padding: 8px; }
            </style>
          </head>
          <body>
            <table>
              <thead>
                <tr>
                  <th colspan="9" style="background-color: #dc2626; color: #facc15; font-size: 24px; font-weight: bold; padding: 15px; text-align: center;">ASADERO LUPITA - REPORTE DE VENTAS</th>
                </tr>
                <tr style="background-color: #1f2937; color: white; font-weight: bold;">
                  <th>Fecha</th>
                  <th>Pollos Vendidos</th>
                  <th>Ventas Brutas</th>
                  <th>Efectivo Cobrado</th>
                  <th>Transferencias</th>
                  <th>Gastos Físicos</th>
                  <th>Pago Tortillería</th>
                  <th>Apartado Refrescos</th>
                  <th>Efectivo Neto Real (Caja)</th>
                </tr>
              </thead>
              <tbody>
        `;

        historialDias.forEach(dia => {
          const rDia = calcularResumen(dia.ventas, dia.gastos);
          const tortillaDia = historialTortillas[dia.fecha.replace(/\//g, '-')] || { dejo: 0, regreso: 0 };
          const pTortillaDia = ((tortillaDia.dejo || 0) - (tortillaDia.regreso || 0)) * 23;
          const pEnviosEfectivo = rDia.costoEnvioEfectivo || 0;
          const pRefrescosDia = rDia.apartadoRefrescos || 0;
          
          const netoEfectivoCaja = rDia.ingresoEfectivo - rDia.totalGastos - pTortillaDia - pEnviosEfectivo - pRefrescosDia;

          tablaHTML += `
            <tr>
              <td style="font-weight: bold;">${dia.fecha}</td>
              <td style="color: #2563eb; font-weight: bold;">${rDia.pollos}</td>
              <td>$${rDia.ventasTotales.toFixed(2)}</td>
              <td style="color: #16a34a; font-weight: bold;">$${rDia.ingresoEfectivo.toFixed(2)}</td>
              <td style="color: #9333ea; font-weight: bold;">$${rDia.ingresoTransferencia.toFixed(2)}</td>
              <td style="color: #dc2626;">-$${rDia.totalGastos.toFixed(2)}</td>
              <td style="color: #eab308;">-$${pTortillaDia.toFixed(2)}</td>
              <td style="color: #0891b2;">-$${pRefrescosDia.toFixed(2)}</td>
              <td style="background-color: #fef9c3; font-weight: bold; color: #166534;">$${netoEfectivoCaja.toFixed(2)}</td>
            </tr>
          `;
        });

        tablaHTML += `
              </tbody>
            </table>
          </body>
          </html>
        `;

        const blob = new Blob([tablaHTML], { type: 'application/vnd.ms-excel;charset=utf-8' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `Reporte_Lupita_${hoyStr.replace(/\//g, '-')}.xls`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const kgVendidosTortilla = (tortillaProv.dejo || 0) - (tortillaProv.regreso || 0);
      const pTortillaProveedor = kgVendidosTortilla * 23;
      const pEnviosRepartidorEfectivo = resHoy.costoEnvioEfectivo || 0;
      const apartadoRefrescosHoy = resHoy.apartadoRefrescos || 0;
      
      const corteNetoFisicoHoy = resHoy.ingresoEfectivo - resHoy.totalGastos - pTortillaProveedor - pEnviosRepartidorEfectivo - apartadoRefrescosHoy;

      const menuTabs = [
        { id: 'local', icon: Iconos.Store, label: 'Local' },
        { id: 'domicilio', icon: Iconos.Truck, label: 'Envíos' },
        { id: 'gastos', icon: Iconos.MinusCircle, label: 'Gastos' }
      ];
      if (esPatron) {
        menuTabs.push({ id: 'cierre', icon: Iconos.Calculator, label: 'Caja/Stock' });
        menuTabs.push({ id: 'vip', icon: Iconos.Star, label: 'VIP' });
        menuTabs.push({ id: 'historial', icon: Iconos.CalendarDays, label: 'Historial' });
      }

      return (
        <div className="min-h-screen bg-gray-300 font-sans text-gray-800 pb-10">
          {modalAlerta.visible && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full text-center">

                     <input type="text" placeholder="Nombre completo..." value={nuevoClienteManual.nombre} onChange={(e) => setNuevoClienteManual({...nuevoClienteManual, nombre: e.target.value})} className="flex-1 p-4 rounded-lg font-black text-gray-900 outline-none focus:ring-4 focus:ring-blue-500" />
                     <button type="submit" className="bg-blue-600 hover:bg-blue-500 text-white font-black py-3 px-8 rounded-lg shadow-xl transition-colors"><Iconos.PlusCircle /> Guardar</button>
                  </form>
                </div>

                <div className="bg-white rounded-xl shadow-2xl border-t-4 border-yellow-400 overflow-hidden">
                   <div className="bg-gray-800 p-6 text-white border-b-4 border-yellow-500">
                      <h3 className="font-black text-xl flex items-center gap-2 text-yellow-400"><Iconos.Star /> Bóveda de Fidelización: Clientes VIP</h3>
                      <p className="text-xs text-gray-300 mt-1 font-bold">Análisis de lealtad basado en el número de pedidos a domicilio y volumen total de pollos.</p>
                   </div>
                   <div className="p-4 space-y-4 max-h-[600px] overflow-y-auto bg-gray-50">
                      {clientesVIP.length === 0 ? (
                        <p className="text-sm text-gray-500 font-bold text-center py-6">Aún no hay clientes registrados con número telefónico.</p>
                      ) : (
                        clientesVIP.map((cliente, index) => {
                          let colorFondo = "bg-white border-gray-200 shadow-sm";
                          let etiquetaStatus = "Cliente Nuevo";
                          let colorBadge = "bg-gray-200 text-gray-600";

                          if (cliente.totalPedidos > 0 && cliente.totalPedidos <= 2) {
                            colorBadge = "bg-red-100 text-red-800 border border-red-200";
                            etiquetaStatus = "Ocasional";
                          } else if (cliente.totalPedidos >= 3 && cliente.totalPedidos <= 6) {
                            colorFondo = "bg-blue-50 border-blue-100 shadow-md";
                            etiquetaStatus = "Frecuente";
                            colorBadge = "bg-blue-600 text-white font-bold";
                          } else if (cliente.totalPedidos >= 7) {
                            colorFondo = "bg-yellow-50 border-yellow-400 shadow-lg ring-2 ring-yellow-400";
                            etiquetaStatus = "👑 VIP MASTER";
                            colorBadge = "bg-yellow-500 text-gray-900 font-black shadow-sm";
                          }

                          return (
                            <div key={cliente.telefono} className={`p-4 rounded-xl border flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 ${colorFondo}`}>
                               <div className="space-y-1">
                                  <div className="flex items-center gap-3">
                                     <span className="font-black text-gray-400 text-sm">#{index + 1}</span>
                                     <h4 className="font-black text-lg text-gray-900 uppercase">{cliente.nombre}</h4>
                                     <span className={`text-[10px] uppercase font-black px-2.5 py-0.5 rounded-full ${colorBadge}`}>{etiquetaStatus}</span>
                                  </div>
                                  <p className="text-sm font-mono text-gray-600 font-bold">📞 Teléfono: {cliente.telefono}</p>
                                  <div className="pt-1 flex flex-wrap gap-1 items-center">
                                     <span className="text-[10px] font-bold text-gray-400 uppercase mr-1">Fechas:</span>
                                     {Array.from(cliente.fechas).length === 0 ? <span className="text-[9px] text-gray-400 italic">Solo en agenda</span> : Array.from(cliente.fechas).map(f => (
                                       <span key={f} className="text-[9px] font-black bg-white border px-1.5 py-0.5 rounded text-gray-500 shadow-sm">{f}</span>
                                     ))}
                                  </div>
                               </div>
                               
                               <div className="flex gap-4 w-full sm:w-auto border-t sm:border-t-0 pt-3 sm:pt-0 justify-between">
                                  <div className="text-center bg-gray-100 px-4 py-2 rounded-lg border shadow-inner">
                                     <span className="block text-[10px] font-black text-gray-500 uppercase tracking-wider">Pedidos</span>
                                     <span className="text-2xl font-black text-gray-800">{cliente.totalPedidos}</span>
                                  </div>
                                  <div className="text-center bg-red-50 px-4 py-2 rounded-lg border border-red-100 shadow-inner">
                                     <span className="block text-[10px] font-black text-red-400 uppercase tracking-wider">Pollos</span>
                                     <span className="text-2xl font-black text-red-600">{cliente.totalPollos} kg</span>
                                  </div>
                               </div>
                            </div>
                          );
                        })
                      )}
                   </div>
                </div>
              </div>
            )}

            {esPatron && vista === 'historial' && (
              <div className="bg-white rounded-xl shadow-2xl border-t-4 border-gray-900 overflow-hidden">
                <div className="bg-gray-900 p-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                   <h3 className="font-black text-white text-xl">Historial de Auditoría</h3>
                   <button onClick={exportarExcel} className="bg-green-500 hover:bg-green-400 text-gray-900 text-sm px-6 py-3 rounded-lg font-black flex items-center gap-2 shadow-xl border-b-4 border-green-700 active:border-b-0 active:mt-1 w-full sm:w-auto justify-center transition-all"><Iconos.Download /> EXPORTAR EXCEL (DISEÑO VIP)</button>
                </div>
                <div className="divide-y-8 divide-gray-200 bg-gray-100 p-2">
                  {historialDias.length === 0 ? (
                     <p className="p-8 text-center text-gray-500 font-black text-lg bg-white rounded-lg">No hay registros de días anteriores todavía.</p>
                  ) : (
                    historialDias.map(dia => {
                      const resDia = calcularResumen(dia.ventas, dia.gastos);
                      const tortillaDia = historialTortillas[dia.fecha.replace(/\//g, '-')] || { dejo: 0, regreso: 0 };
                      const kgTortillaDia = (tortillaDia.dejo || 0) - (tortillaDia.regreso || 0);
                      const pTortillaDia = kgTortillaDia * 23;
                      const pEnviosEfectivoDia = resDia.costoEnvioEfectivo || 0;
                      const pRefrescosDia = resDia.apartadoRefrescos || 0;

                      const efectivoNetoFisicoDia = resDia.ingresoEfectivo - resDia.totalGastos - pTortillaDia - pEnviosEfectivoDia - pRefrescosDia;

                      return (
                        <div key={dia.fecha} className="p-4 sm:p-6 bg-white rounded-xl shadow-sm">
                          <h4 className="font-black text-2xl text-red-600 mb-4 border-b-2 border-red-100 pb-2">{dia.fecha}</h4>
                          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                            <div className="bg-gray-50 p-3 rounded-lg border border-gray-200 text-center shadow-inner">
                              <span className="block text-[10px] text-gray-500 uppercase font-black tracking-widest">Ventas Totales</span>
                              <span className="block text-xl font-black text-gray-900">${resDia.ventasTotales.toFixed(2)}</span>
                            </div>
                            <div className="bg-purple-50 p-3 rounded-lg border border-purple-200 text-center shadow-inner">
                              <span className="block text-[10px] text-purple-400 uppercase font-black tracking-widest">Transferencias</span>
                              <span className="block text-xl font-black text-purple-700">${resDia.ingresoTransferencia.toFixed(2)}</span>
                            </div>
                            <div className="bg-blue-50 p-3 rounded-lg border border-blue-200 text-center shadow-inner">
                              <span className="block text-[10px] text-blue-400 uppercase font-black tracking-widest">Pollos Vendidos</span>
                              <span className="block text-xl font-black text-blue-700">{resDia.pollos}</span>
                            </div>
                            
                            <div className="bg-green-50 p-3 rounded-lg border border-green-200 text-center shadow-inner">
                              <span className="block text-[10px] text-green-600 uppercase font-black tracking-widest">Efectivo Cobrado</span>
                              <span className="block text-xl font-black text-green-700">${resDia.ingresoEfectivo.toFixed(2)}</span>
                            </div>
                            <div className="bg-cyan-50 p-3 rounded-lg border border-cyan-200 text-center shadow-inner">
                              <span className="block text-[10px] text-cyan-500 uppercase font-black tracking-widest">Apt. Refrescos</span>
                              <span className="block text-xl font-black text-cyan-700">-${pRefrescosDia.toFixed(2)}</span>
                            </div>
                            <div className="bg-red-50 p-3 rounded-lg border border-red-200 text-center shadow-inner">
                              <span className="block text-[10px] text-red-400 uppercase font-black tracking-widest">Gastos Físicos</span>
                              <span className="block text-xl font-black text-red-600">-${resDia.totalGastos.toFixed(2)}</span>
                            </div>
                            <div className="bg-blue-50 p-3 rounded-lg border border-blue-200 text-center shadow-inner">
                              <span className="block text-[10px] text-blue-400 uppercase font-black tracking-widest">Envíos Pagados</span>
                              <span className="block text-xl font-black text-blue-700">{resDia.cantidadEnvios} (-${pEnviosEfectivoDia} Efc)</span>
                            </div>
                            
                            <div className="col-span-2 sm:col-span-3 lg:col-span-4 bg-yellow-400 p-6 rounded-xl shadow-lg text-center text-gray-900 mt-4 border-4 border-yellow-500">
                               <span className="block text-sm uppercase font-black tracking-widest mb-1 text-yellow-800">Efectivo Físico Neto a Retirar</span>
                               <span className="block text-4xl font-black">${efectivoNetoFisicoDia.toFixed(2)}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
